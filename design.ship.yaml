version: "1.0"

project:
  name: "ship-a-website — Design System"

pipeline:
  auto_continue: false
  agent_backend: copilot

models:
  opus: claude-opus-4.6
  sonnet: claude-sonnet-4.6
  haiku: claude-haiku-4.5

paths:
  roadmap_dir: roadmap/design
  specs_dir: specs/design

variables:
  components_dir: "src/components"
  layouts_dir: "src/layouts"
  styles_dir: "src/styles"
  sidecar_dir: "src/content/design-system"

quality:
  max_iterations: 3
  agent: shep.quality-gate
  model: sonnet
  on_failure: remediate
  prompt: |
    Review the {{stage}} stage output. FAIL only if there are issues
    that would cause the next pipeline stage to produce incorrect output,
    if the implementation violates BEM conventions, or if design tokens
    are used incorrectly.

    End your response with exactly one of:
    QUALITY_GATE_RESULT: PASS
    or:
    QUALITY_GATE_RESULT: FAIL
    FINDINGS:
    - <specific finding>
  remediation_prompt: |
    Fix the following quality issues. Make surgical edits only.

    ## Feedback
    {{feedback}}

stages:
  - name: specify
    icon: 📝
    display_name: Design Spec
    model: sonnet
    prompt: |
      ## Role
      You are the design specification agent for a ship-a-website design system.

      ## Task
      Create a feature specification for the work item described below.

      WORK_ID: {{work_id}}
      TITLE: {{title}}
      DESCRIPTION:
      {{description}}

      Create a branch named `{{work_id}}-<short-kebab-title>` and write
      `specs/design/{{work_id}}/spec.md` that defines:

      - **What changes**: Which components, layouts, tokens, or templates are affected
      - **What it must do**: Behavior requirements
      - **What is out of scope**: Explicit exclusions
      - **Design constraints**: BEM compliance, token-only values, no `!important`
      - **Component API changes**: Props added/removed/changed
      - **Sidecar documentation**: Which design-system docs must be updated
      - **Acceptance criteria**: Testable conditions for pipeline completion

      Read existing component and token files before writing the spec.
      Do not write implementation code in this stage.
    quality:
      enabled: true
      prompt: |
        Verify `specs/design/{{work_id}}/spec.md` exists and defines:
        - Specific components/tokens affected
        - Testable acceptance criteria
        - Explicit sidecar documentation requirements
        FAIL if acceptance criteria are missing or vague.

        End your response with exactly one of:
        QUALITY_GATE_RESULT: PASS
        or:
        QUALITY_GATE_RESULT: FAIL
        FINDINGS:
        - <specific finding>

  - name: plan
    icon: 🗺️
    display_name: Implementation Plan
    model: sonnet
    prompt: |
      ## Role
      You are the design implementation planner.

      ## Task
      Read `specs/design/{{work_id}}/spec.md` and write an implementation plan
      to `specs/design/{{work_id}}/plan.md`.

      The plan must:
      - List every file that will change (components, layouts, tokens, sidecar docs)
      - Identify any token additions needed in `src/styles/global.css`
      - Flag any changes to component Props interfaces (breaking vs. additive)
      - Note the order of changes to avoid build failures during implementation
      - Confirm BEM class naming for any new CSS classes

      Do not write implementation code in this stage.
    quality:
      enabled: true
      prompt: |
        Verify `specs/design/{{work_id}}/plan.md` lists:
        - Every file that will change
        - BEM class names for new CSS classes
        - Whether Props interfaces change (and whether it's breaking)
        FAIL if the plan omits any affected files.

        End your response with exactly one of:
        QUALITY_GATE_RESULT: PASS
        or:
        QUALITY_GATE_RESULT: FAIL
        FINDINGS:
        - <specific finding>

  - name: tasks
    icon: ✅
    display_name: Task Generation
    model: sonnet
    prompt: |
      ## Role
      You are the task generation agent.

      ## Task
      Read `specs/design/{{work_id}}/plan.md` and write
      `specs/design/{{work_id}}/tasks.md` — an ordered, dependency-resolved
      list of implementation tasks.

      Format each task as:
      ```
      - [ ] TASK-N: <verb> <what> in <file>
        Context: <one-line why>
        Acceptance: <verifiable done condition>
      ```

      Order tasks so no task depends on a file that hasn't been created yet.
    quality:
      enabled: false

  - name: implement
    icon: 🔧
    display_name: Implementation
    model: opus
    timeout_ms: 1800000
    prompt: |
      ## Role
      You are the design system implementation agent. You are writing production
      code for a static site. The code must be correct on the first run.

      ## Design system rules
      - All values come from tokens in `src/styles/global.css`. Never hardcode.
      - New CSS classes use BEM: `.block__element--modifier`.
      - Block classes must wrap element classes in the DOM.
      - No `!important`. No `eslint-disable`. No inline styles.
      - The neon palette (`cyan/purple/magenta/green`) is for glow halos only.
      - `ink-400` is banned outside `global.css` (WCAG contrast failure).

      ## Task
      Read `specs/design/{{work_id}}/tasks.md` and implement all tasks.
      After implementing, run `npm run lint` to verify no violations.
      Fix any violations before proceeding.
    quality:
      enabled: true
      command: "npm run lint 2>&1"

  - name: sidecar
    icon: 📖
    display_name: Sidecar Docs
    model: sonnet
    prompt: |
      ## Role
      You are the sidecar documentation agent. You maintain the browsable design
      system documentation at `src/content/design-system/`.

      ## Task
      Read `specs/design/{{work_id}}/spec.md` for the list of sidecar documentation
      changes required.

      For each changed component or token:
      - Update the corresponding `.mdx` file in `{{sidecar_dir}}/`
      - Keep the Props table accurate and complete
      - Reflect any new design token usage
      - Update the status field if the component status changed
        (`stable` / `beta` / `deprecated`)

      Do not touch any `.astro`, `.ts`, or `.css` files in this stage.
    quality:
      enabled: true
      prompt: |
        Verify that every component or token changed in the implement stage has an
        updated sidecar doc in `src/content/design-system/`.
        FAIL if a changed component has an outdated Props table.

        End your response with exactly one of:
        QUALITY_GATE_RESULT: PASS
        or:
        QUALITY_GATE_RESULT: FAIL
        FINDINGS:
        - <specific finding>

  - name: test
    icon: 🧪
    display_name: Test Authoring
    model: sonnet
    prompt: |
      ## Role
      You are the test authoring agent.

      ## Task
      Write or update tests for the components changed in this pipeline run.

      Test requirements:
      - Test every Props variant documented in the sidecar
      - Test BEM class presence for each variant
      - Test that required analytics attributes are rendered
      - Tests live in `tests/` mirroring the component path

      Run the tests after writing them and fix any failures.
    quality:
      enabled: true
      command: "npm test 2>&1 || echo 'NO TESTS CONFIGURED'"

  - name: build-verify
    icon: 🏗️
    display_name: Build Verification
    model: haiku
    prompt: |
      ## Role
      You are the build verification agent.

      ## Task
      Run `npm run build` and confirm it succeeds with zero warnings or errors.
      If there are build errors, fix them before proceeding.
    quality:
      enabled: true
      command: "npm run build 2>&1"

  - name: content-regression
    icon: 🔍
    display_name: Content Regression Check
    model: sonnet
    prompt: |
      ## Role
      You are the content regression agent. Your job is to verify that design
      system changes did not accidentally break existing page content.

      ## Task
      1. Run `npm run lint:seo` — must pass.
      2. Run `npm run lint` — must pass.
      3. Review the diff for any accidental edits to content in `src/pages/` or
         `src/content/pages/` or `src/content/blog/` that were not part of the spec.
      4. If any unintended content changes are found, revert them.
    quality:
      enabled: true
      command: "npm run lint 2>&1 && npm run lint:seo 2>&1"

  - name: merge
    icon: 🚀
    display_name: Merge
    type: merge
    merge:
      merge_method: squash
