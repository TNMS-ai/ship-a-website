name: Bug report
description: Something in the template is broken or producing unexpected output.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in as much detail as you can.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I run `npm run build`, I get…
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: I expected the build to succeed with…
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Clone the repo
        2. Run `npm install`
        3. Run `npm run build`
        4. See error…
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node version
      placeholder: "e.g. 22.12.0"
    validations:
      required: true

  - type: input
    id: npm-version
    attributes:
      label: npm version
      placeholder: "e.g. 10.9.0"
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Error output, screenshots, or anything else that might help.
    validations:
      required: false
